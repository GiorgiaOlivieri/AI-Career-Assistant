<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meet Giorgia</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:40px;
    background:#f7f8fa;
}

h1{
    color:#222;
    margin-bottom:5px;
}

.subtitle{
    font-size:20px;
    color:#666;
    margin-bottom:25px;
}

.profile-pic{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 20px auto;
}
button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    font-size:16px;
    text-align:left;
    transition:0.2s;
}

button:hover{
    background:#eceff3;
}

#chat{
    margin-top:30px;
}

.message{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:10px;
    line-height:1.7;
    white-space:pre-line;
}

</style>
</head>

<body>

<img src="2-CV pic.png" alt="Giorgia" class="profile-pic">
    
<h1>👋 Meet Giorgia</h1>

<div class="subtitle">
Management Engineer | Cyber Security Process Expert | Business Improvement Mindset
</div>

<p>
Welcome! Ask me anything about Giorgia's profile.
</p>

<button onclick="answer('who')">
Who is Giorgia?
</button>

<button onclick="answer('hire')">
Why should we hire Giorgia?
</button>

<button onclick="answer('experience')">
What is her previous experience?
</button>

<button onclick="answer('hardskills')">
What are her hard skills?
</button>

<button onclick="answer('softskills')">
What are her soft skills?
</button>

<button onclick="answer('interests')">
What are her interests?
</button>

<div id="chat"></div>

<script>

function answer(type){

let responses = {

who:
`I am a Management Engineer with an international background and a strong passion for innovation, problem-solving and continuous improvement.

Born in Abruzzo, educated between Rome, Portugal and Turin, I have always looked for experiences that pushed me outside my comfort zone. From developing a social-impact startup for off-grid solar energy in Uganda to leading process improvement initiatives in the automotive sector, I enjoy turning ideas into tangible results while building strong relationships with the people around me.

I am naturally curious, proactive and energetic, and I am constantly looking for opportunities to learn, grow and create value.`,

hire:
`Because I combine analytical thinking with initiative and execution.

In every experience I have had, I quickly moved beyond simply performing assigned tasks and focused on understanding how things could be improved. I enjoy taking ownership, building relationships with stakeholders and driving tangible results.

I am looking for an environment that values ambition, learning and impact, and where I can continue growing as fast as the challenges around me.`,

impact:
`During my Master's thesis, I led the development of Juakit, a social-impact startup bringing solar energy to vulnerable communities in Uganda, managing activities ranging from business planning and funding applications to stakeholder engagement and public presentations.

In my current role, I have contributed to process optimization and automation initiatives, helping reduce manual effort, identify inefficiencies and support cost-saving improvements.

My goal is always the same: leave processes, projects and teams better than I found them.`,

experience:
`My experience combines business, technology and process improvement.

During my Master's thesis project, I developed Juakit, a startup created to bring off-grid solar energy to vulnerable communities in Sub-Saharan Africa. As Project Manager, I worked on business planning, funding applications, stakeholder engagement, market analysis and public presentations.

Today, I work as a Cyber Security Process Expert in the automotive sector, supporting IT Internal Controls over Financial Reporting (ICFR). Beyond audit and compliance activities, I have contributed to process optimization initiatives, automation projects and cost-saving improvements by challenging inefficient practices and helping transform manual activities into scalable solutions.

My goal is always the same: leave processes, projects and teams better than I found them.`,
    
hardskills:
`My background combines business, technology and process optimization.

I have developed strong analytical and organizational skills through experiences in project management, startup development, IT audit and continuous improvement initiatives.

I am proficient in SAP, the Microsoft Office Suite (Excel, PowerPoint and Project), Power BI and Python. Through my work in IT audit and compliance, I have also gained exposure to leading cybersecurity and governance frameworks, including ISO 27001, NIS2, NIST and DORA.

Beyond technical proficiency, I enjoy using these tools and methodologies to understand systems, improve processes and support informed decision-making.`,

softskills:
`The qualities that best describe me are ownership, adaptability and communication.

I enjoy working with people, understanding different perspectives and creating collaboration between teams with different goals and backgrounds. Whether presenting a project to hundreds of people, interviewing stakeholders, coordinating activities or supporting remediation plans, I naturally take initiative and focus on finding practical solutions.

I am also highly resilient and comfortable in dynamic environments where priorities evolve quickly.`,

interests:
`Curiosity has always been one of my strongest drivers.

I enjoy discovering new ideas, meeting people with different backgrounds and challenging myself in unfamiliar environments.

This is exactly why I chose Management Engineering: a multidisciplinary field that reflects my personality and allows me to combine technology, business, problem-solving and human interaction. I like being able to move across different topics, connect perspectives and turn complexity into practical solutions.

Whether through my Erasmus experience, international projects or professional challenges, I am constantly looking for opportunities to learn, contribute and grow.`

};

document.getElementById("chat").innerHTML =
`
<div class="message">
⏳ Thinking...
</div>
`;

setTimeout(() => {

document.getElementById("chat").innerHTML =
`
<div class="message">
${responses[type]}
</div>
`;

},1000);

}

</script>

</body>
</html>
