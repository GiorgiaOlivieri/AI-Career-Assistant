<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Career Assistant</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:40px;
    background:#f7f8fa;
}

h1{
    color:#222;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    font-size:16px;
    text-align:left;
}

button:hover{
    background:#eceff3;
}

#chat{
    margin-top:30px;
}

.message{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>👋 👋 Meet Giorgia

Your interactive guide to my profile </h1>

<p>
Welcome! Ask me anything about Giorgia's profile.
</p>

<button onclick="answer('who')">
Who is Giorgia?
</button>

<button onclick="answer('softskills')">
What are her soft skills?
</button>

<button onclick="answer('experience')">
What is her previous experience?
</button>

<button onclick="answer('interests')">
What are her interests?
</button>

<button onclick="answer('hardskills')">
What are her hard skills?
</button>

<button onclick="answer('hire')">
Why should we hire Giorgia?
</button>

<div id="chat"></div>

<script>

function answer(type){

let responses = {

who:
`I am a Management Engineer with an international background and a strong passion for innovation, problem-solving and continuous improvement.

Born in Abruzzo, educated between Rome, Portugal and Turin, I have always looked for experiences that pushed me outside my comfort zone. From developing a social-impact startup for off-grid solar energy in Uganda to leading process improvement initiatives in the automotive sector, I enjoy turning ideas into tangible results while building strong relationships with the people around me.

I am naturally curious, proactive and energetic, and I am constantly looking for opportunities to learn, grow and create value`,

softskills:
`The qualities that best describe me are ownership, adaptability and communication.

I enjoy working with people, understanding different perspectives and creating collaboration between teams with different goals and backgrounds. Whether presenting a project to hundreds of people, interviewing stakeholders, coordinating activities or supporting remediation plans, I naturally take initiative and focus on finding practical solutions.

I am also highly resilient and comfortable in dynamic environments where priorities evolve quickly.`,

experience:
`My experience combines business, technology and process improvement.

During my Master's thesis project, I developed Juakit, a startup created to bring off-grid solar energy to vulnerable communities in Sub-Saharan Africa. As Project Manager, I worked on business planning, funding applications, stakeholder engagement, market analysis and public presentations.

Today, I work as a Cyber Security Process Expert in the automotive sector, supporting IT Internal Controls over Financial Reporting (ICFR). Beyond audit and compliance activities, I have contributed to process optimization initiatives, automation projects and cost-saving improvements by challenging inefficient practices and helping transform manual activities into scalable solutions.`,

interests:
`I am naturally curious and passionate about understanding how things work, how they can be improved and how technology can create value for people and organizations.

This is one of the reasons why Management Engineering has always felt like the right fit for me: it combines business, technology, strategy and people, offering the versatility to approach challenges from different perspectives.

I enjoy exploring new cultures, working with diverse stakeholders and continuously learning from new experiences. My Erasmus journey, international projects and multidisciplinary background all reflect this proactive mindset and my desire to keep growing both professionally and personally.`,

hardskills:
`My hard skills combine business, technology and analytical thinking. Throughout my academic and professional experiences, I have worked on process improvement, project management, IT audit, risk assessment and data-driven decision making.

I am comfortable working with enterprise systems such as SAP, advanced Microsoft Office tools (Excel, PowerPoint and Project), and technologies like Python, Power BI and process modeling platforms. What I enjoy most, however, is using these tools to simplify complexity, improve efficiency and turn ideas into practical solutions.`,

hire:
`Because I combine analytical thinking with initiative and execution. In every experience I have had, I quickly moved beyond simply performing assigned tasks and focused on understanding how things could be improved. I enjoy taking ownership, building relationships with stakeholders and driving tangible results. I am looking for an environment that values ambition, learning and impact, and where I can continue growing as fast as the challenges around me.`

};

document.getElementById("chat").innerHTML =
`
<div class="message">
⏳ Thinking...
</div>
`;

setTimeout(() => {

document.getElementById("chat").innerHTML =
`
<div class="message">
${responses[type]}
</div>
`;

},1000);

}

</script>

</body>
</html>
